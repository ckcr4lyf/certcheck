name: Run index.mjs on push

on:
  push: {}
  schedule:
    # Every day at 5:00 AM UTC
    - cron: '0 5 * * *'  

jobs:
  run-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run index.mjs
        run: node index.mjs
